[build]
  command = """
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter &&
    export PATH="$HOME/flutter/bin:$PATH" &&
    flutter --version &&
    flutter config --enable-web &&
    flutter pub get &&
    flutter build web
  """
  publish = "build/web"

[functions]
  directory = "netlify/functions"